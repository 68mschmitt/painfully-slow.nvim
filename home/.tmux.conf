# Apple IIe remote terminal - tmux config
set-option -g default-shell /bin/bash
set-option -g default-command /bin/bash
set-option -g default-terminal "vt100"

# Prefix: Ctrl-A
# (Ctrl-Space generates NUL/0x00 which is dropped by serial/PTY layers)
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Show prefix indicator in status bar
set-option -g status-right "#{?client_prefix, PREFIX ,}"

# Vi copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
