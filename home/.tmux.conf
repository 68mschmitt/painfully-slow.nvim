# Apple IIe remote terminal - tmux config
set-option -g default-shell /bin/bash
set-option -g default-command /bin/bash
set-option -g default-terminal "vt100"

# Disable alternate character set (ACS) for pane borders.
# The SO byte (0x0E) enters DEC Special Graphics and SI (0x0F) exits it.
# If SI gets dropped over serial, the terminal stays in graphics mode and
# lowercase a-z render as line-drawing characters instead of letters.
set-option -g pane-border-lines simple
set-option -as terminal-overrides ",vt100:enacs@:smacs@:rmacs@:acsc@"

# Prefix: Ctrl-A
# (Ctrl-Space generates NUL/0x00 which is dropped by serial/PTY layers)
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Show prefix indicator in status bar
set-option -g status-right "#{?client_prefix, PREFIX ,}"

# Vi copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
